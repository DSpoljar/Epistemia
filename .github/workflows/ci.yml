name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Check PATCH tests have GET round-trips
        working-directory: backend
        run: |
          FAIL=0
          for f in $(grep -rl "method: 'PATCH'" src/modules 2>/dev/null); do
            if ! grep -q "method: 'GET'" "$f"; then
              echo "Missing GET round-trip in: $f"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
